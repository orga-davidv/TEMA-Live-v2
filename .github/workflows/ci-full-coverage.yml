name: CI Full Pytest Coverage

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  full-pytest-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy pandas scipy scikit-learn optuna

      - name: Run near-full pytest with coverage gate
        run: |
          pytest -q tests \
            --ignore=tests/test_parity_wave3.py \
            --ignore=tests/test_runner_orchestration.py \
            --cov=src/tema \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            --junitxml=pytest-full.xml

      - name: Upload coverage and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-pytest-coverage-artifacts
          path: |
            coverage.xml
            pytest-full.xml
          if-no-files-found: warn
